<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Geometry Dash</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    html { height: 100%; overflow: hidden; }
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
    body {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: #000; overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    #gameCanvas {
      display: block;
      width:  min(100vw, calc(100vh * 1.38462));
      height: min(100vh, calc(100vw * 0.72222));
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>

// ─────────────────────────────────────────────
//  CANVAS
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 650;
canvas.width = W; canvas.height = H;
const FONT = "'Orbitron', 'Courier New', monospace";
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const GROUND_Y    = 520;   // y-position of the ground surface
const CEILING_Y   = 60;    // top boundary in ship mode
const CUBE_SIZE   = 40;
const CUBE_X      = 200;   // cube stays at fixed x
const GRAVITY     = 0.72;
const JUMP_FORCE  = -15.5;
const BASE_SPEED  = 6.5;   // world scroll speed (px/frame)
const SHIP_GRAVITY = 0.28;
const SHIP_THRUST  = -0.95;
const SHIP_MAX_VY  = 9;
const BALL_GRAVITY = 0.55;
const MODE_CYCLE   = ['cube', 'ship', 'ball'];

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let gameState   = 'start'; // start | playing | dead
let gameMode    = 'cube';  // cube | ship | ball
let holding     = false;
let ballGravDir = 1;       // 1 = down, -1 = up (ball mode)
let themeSection = -1;
let displayHue   = 270;    // current animated hue
let targetHue    = 270;
let score       = 0;
let bestScore   = parseInt(localStorage.getItem('gdBest') || '0');
let attempts    = 0;
let speed       = BASE_SPEED;
let worldX      = 0;        // how far the world has scrolled
let portalTimer = 0;
let gameTime    = 0;

// ── Cube ──
const cube = {
  x: CUBE_X,
  y: GROUND_Y - CUBE_SIZE,
  vy: 0,
  rotation: 0,
  onGround: true,
};

function resetCube() {
  cube.y           = GROUND_Y - CUBE_SIZE;
  cube.vy          = 0;
  cube.rotation    = 0;
  cube.onGround      = true;
  cube.canDoubleJump = true;
  ballGravDir        = 1;
}

// ── Obstacles ──
let obstacles = [];  // { type:'spike'|'block', x, w, h }
let spawnTimer = 0;
let spawnInterval = 80; // frames between obstacle groups

// ── Coins ──
let coins          = [];
let coinsCollected = 0;
let coinSpawnTimer = 0;
const COIN_R     = 12;
const COIN_VALUE = 10;

// ── Particles ──
let particles = [];

// ── Trail ──
let trail = [];

// ── Screen Shake ──
let shakeFrames = 0;
const SHAKE_DURATION  = 18;
const SHAKE_MAGNITUDE = 7;

// ── Background elements ──
let bgLines = [];      // decorative grid lines
let bgStars = Array.from({length:100}, () => ({
  x: Math.random()*W, y: Math.random()*(GROUND_Y-60),
  r: Math.random()*1.3+0.2, a: Math.random()*0.6+0.1,
}));

// ─────────────────────────────────────────────
//  OBSTACLE SPAWNER
// ─────────────────────────────────────────────
const SPIKE_W = 40, SPIKE_H = 40;
const BLOCK_W = 40, BLOCK_H = 40;

function spawnObstacle() {
  const x = W + 60;
  const roll = Math.random();

  if (roll < 0.35) {
    // Single spike
    obstacles.push({ type:'spike', x, w:SPIKE_W, h:SPIKE_H });

  } else if (roll < 0.6) {
    // Double spike
    obstacles.push({ type:'spike', x,             w:SPIKE_W, h:SPIKE_H });
    obstacles.push({ type:'spike', x:x+SPIKE_W+4, w:SPIKE_W, h:SPIKE_H });

  } else if (roll < 0.75) {
    // Triple spike
    for (let i=0; i<3; i++)
      obstacles.push({ type:'spike', x:x+i*(SPIKE_W+4), w:SPIKE_W, h:SPIKE_H });

  } else if (roll < 0.78) {
    // Single block (jumpable over)
    obstacles.push({ type:'block', x, w:BLOCK_W, h:BLOCK_H });

  } else if (roll < 0.87) {
    // Block + spike after
    obstacles.push({ type:'block', x, w:BLOCK_W, h:BLOCK_H });
    obstacles.push({ type:'spike', x:x+BLOCK_W+55, w:SPIKE_W, h:SPIKE_H });

  } else if (roll < 0.94) {
    // Moving block (oszilliert auf/ab)
    obstacles.push({
      type:'movingBlock', x, w:BLOCK_W, h:BLOCK_H,
      amplitude: 50 + Math.random() * 40,
      oscSpeed:  0.032 + Math.random() * 0.02,
      phase:     Math.random() * Math.PI * 2,
    });

  } else {
    // Floating spike (schwebt in der Luft, bewegt sich auf/ab)
    const baseY = GROUND_Y - 100 - Math.random() * 130;
    obstacles.push({
      type:'floatSpike', x, w:SPIKE_W, h:SPIKE_H,
      baseY,
      amplitude: 40 + Math.random() * 40,
      oscSpeed:  0.028 + Math.random() * 0.022,
      phase:     Math.random() * Math.PI * 2,
    });
  }
}

// ─────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playJumpSound() {
  const ac  = getAudio();
  const osc = ac.createOscillator();
  const g   = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(280, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(560, ac.currentTime + 0.08);
  g.gain.setValueAtTime(0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
  osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.12);
}

function playDeathSound() {
  const ac = getAudio();

  // Rausch-Burst (Explosion)
  const rate   = ac.sampleRate;
  const frames = Math.floor(rate * 0.35);
  const buf    = ac.createBuffer(1, frames, rate);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < frames; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / frames);
  const noise = ac.createBufferSource();
  noise.buffer = buf;
  const noiseFilter = ac.createBiquadFilter();
  noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 350;
  const noiseGain = ac.createGain();
  noiseGain.gain.setValueAtTime(0.28, ac.currentTime);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(ac.destination);
  noise.start();

  // Absinkender Ton
  const osc = ac.createOscillator();
  const g   = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(480, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.4);
  g.gain.setValueAtTime(0.18, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
  osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.4);
}

function playCoinSound() {
  const ac = getAudio();
  [880, 1320].forEach((freq, i) => {
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.06);
    g.gain.setValueAtTime(0.09, ac.currentTime + i * 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.06 + 0.12);
    osc.start(ac.currentTime + i * 0.06);
    osc.stop(ac.currentTime + i * 0.06 + 0.12);
  });
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function tryAction() {
  if (gameState === 'dead' || gameState === 'start') { startGame(); return; }
  if (gameMode === 'cube') {
    if (cube.onGround) {
      cube.vy = JUMP_FORCE;
      cube.onGround = false;
      cube.canDoubleJump = true;
      playJumpSound();
    } else if (cube.canDoubleJump) {
      cube.vy = JUMP_FORCE * 0.85;
      cube.canDoubleJump = false;
      playJumpSound();
    }
  } else if (gameMode === 'ball') {
    ballGravDir *= -1;
    cube.vy = ballGravDir * -4;
    playJumpSound();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault(); holding = true; tryAction();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') holding = false;
});
canvas.addEventListener('click',      () => tryAction());
canvas.addEventListener('touchstart', e => { e.preventDefault(); holding = true;  tryAction(); }, { passive:false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); holding = false; }, { passive:false });

// ─────────────────────────────────────────────
//  GAME FLOW
// ─────────────────────────────────────────────
function startGame() {
  attempts++;
  resetCube();
  obstacles      = [];
  particles      = [];
  trail          = [];
  coins          = [];
  coinsCollected = 0;
  coinSpawnTimer = 0;
  spawnTimer   = 0;
  portalTimer  = 0;
  gameTime     = 0;
  spawnInterval = 80;
  speed        = BASE_SPEED;
  worldX       = 0;
  score        = 0;
  gameMode     = 'cube';
  holding      = false;
  ballGravDir  = 1;
  themeSection = -1;
  displayHue   = 270;
  targetHue    = 270;
  gameState    = 'playing';
}

function spawnParticles() {
  const cx = cube.x + CUBE_SIZE / 2;
  const cy = cube.y + CUBE_SIZE / 2;
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 7 + 2;
    // Cube-Farben: Blau/Cyan + ein paar weiße Highlights
    const hue   = Math.random() < 0.2 ? 0 : 190 + Math.random() * 40;
    particles.push({
      x: cx + (Math.random() - 0.5) * CUBE_SIZE,
      y: cy + (Math.random() - 0.5) * CUBE_SIZE,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 3,
      life: 1.0,
      decay: Math.random() * 0.018 + 0.012,
      size: Math.random() * 7 + 3,
      hue,
    });
  }
}

function dieCube() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('gdBest', bestScore);
  }
  spawnParticles();
  playDeathSound();
  shakeFrames = SHAKE_DURATION;
  gameState = 'dead';
}

// ─────────────────────────────────────────────
//  COLLISION DETECTION
// ─────────────────────────────────────────────
function sign(p1x, p1y, p2x, p2y, p3x, p3y) {
  return (p1x - p3x) * (p2y - p3y) - (p2x - p3x) * (p1y - p3y);
}

function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
  const d1 = sign(px, py, ax, ay, bx, by);
  const d2 = sign(px, py, bx, by, cx, cy);
  const d3 = sign(px, py, cx, cy, ax, ay);
  const hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
  const hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);
  return !(hasNeg && hasPos);
}

function checkCollisions() {
  const INSET = 4;
  const cx1 = cube.x + INSET;
  const cy1 = cube.y + INSET;
  const cx2 = cube.x + CUBE_SIZE - INSET;
  const cy2 = cube.y + CUBE_SIZE - INSET;

  for (const ob of obstacles) {
    // Portal → Modus wechseln, kein Tod
    if (ob.type === 'portal') {
      if (!ob.triggered && cube.x + CUBE_SIZE / 2 >= ob.x + ob.w / 2) {
        ob.triggered = true;
        gameMode = ob.targetMode;
        if (gameMode === 'cube') cube.vy = Math.min(cube.vy, 2);
        if (gameMode === 'ball') { ballGravDir = 1; cube.vy = 0; }
      }
      continue;
    }

    if (ob.type === 'spike') {
      // Spike-Dreieck: Ecken (links-unten, Spitze, rechts-unten)
      const ax = ob.x,           ay = GROUND_Y;
      const bx = ob.x + ob.w/2, by = GROUND_Y - ob.h;
      const cx = ob.x + ob.w,   cy = GROUND_Y;

      if (
        pointInTriangle(cx1, cy1, ax, ay, bx, by, cx, cy) ||
        pointInTriangle(cx2, cy1, ax, ay, bx, by, cx, cy) ||
        pointInTriangle(cx1, cy2, ax, ay, bx, by, cx, cy) ||
        pointInTriangle(cx2, cy2, ax, ay, bx, by, cx, cy)
      ) { dieCube(); return; }

    } else if (ob.type === 'movingBlock') {
      const topY = GROUND_Y - ob.h - Math.abs(Math.sin(gameTime * ob.oscSpeed + ob.phase)) * ob.amplitude;
      if (cx1 < ob.x+ob.w && cx2 > ob.x && cy1 < topY+ob.h && cy2 > topY) { dieCube(); return; }

    } else if (ob.type === 'floatSpike') {
      const fy  = ob.baseY + Math.sin(gameTime * ob.oscSpeed + ob.phase) * ob.amplitude;
      const fax = ob.x,           fay = fy + ob.h/2;
      const fbx = ob.x + ob.w/2, fby = fy - ob.h/2;
      const fcx = ob.x + ob.w,   fcy = fy + ob.h/2;
      if (
        pointInTriangle(cx1,cy1,fax,fay,fbx,fby,fcx,fcy) ||
        pointInTriangle(cx2,cy1,fax,fay,fbx,fby,fcx,fcy) ||
        pointInTriangle(cx1,cy2,fax,fay,fbx,fby,fcx,fcy) ||
        pointInTriangle(cx2,cy2,fax,fay,fbx,fby,fcx,fcy)
      ) { dieCube(); return; }

    } else {
      // Block: AABB
      const bx1 = ob.x,          by1 = GROUND_Y - ob.h;
      const bx2 = ob.x + ob.w,   by2 = GROUND_Y;

      if (cx1 < bx2 && cx2 > bx1 && cy1 < by2 && cy2 > by1) {
        dieCube(); return;
      }
    }
  }
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update() {
  if (gameState !== 'playing') return;

  gameTime++;

  // ── Scroll world ──
  worldX += speed;
  score   = Math.floor(worldX / 60);

  // Speed ramp-up (gentle, every 300 pts)
  speed = BASE_SPEED + Math.floor(score / 300) * 0.4;
  spawnInterval = Math.max(50, 80 - Math.floor(score / 200) * 3);

  // ── Farbsektion ──
  const sec = Math.floor(score / 300);
  if (sec !== themeSection) {
    themeSection = sec;
    targetHue = (270 + themeSection * 90) % 360;
  }
  const hueDiff = ((targetHue - displayHue + 540) % 360) - 180;
  displayHue = (displayHue + hueDiff * 0.015 + 360) % 360;

  // ── Physics (mode-dependent) ──
  if (gameMode === 'ship') {
    if (holding) cube.vy += SHIP_THRUST;
    cube.vy += SHIP_GRAVITY;
    cube.vy  = Math.max(-SHIP_MAX_VY, Math.min(SHIP_MAX_VY, cube.vy));
    cube.y  += cube.vy;
    cube.rotation = Math.max(-0.5, Math.min(0.5, cube.vy * 0.055));
    cube.onGround = false;
    if (cube.y < CEILING_Y)              { cube.y = CEILING_Y;              dieCube(); return; }
    if (cube.y >= GROUND_Y - CUBE_SIZE)  { cube.y = GROUND_Y - CUBE_SIZE;   dieCube(); return; }
  } else if (gameMode === 'ball') {
    cube.vy += BALL_GRAVITY * ballGravDir;
    cube.vy  = Math.max(-11, Math.min(11, cube.vy));
    cube.y  += cube.vy;
    cube.rotation += speed * 0.05 * ballGravDir;
    if (cube.y >= GROUND_Y - CUBE_SIZE) {
      cube.y = GROUND_Y - CUBE_SIZE; cube.vy = 0; cube.onGround = true;
    } else if (cube.y <= CEILING_Y) {
      cube.y = CEILING_Y; cube.vy = 0; cube.onGround = false;
    } else {
      cube.onGround = false;
    }
  } else {
    cube.vy += GRAVITY;
    cube.y  += cube.vy;
    if (cube.y >= GROUND_Y - CUBE_SIZE) {
      cube.y             = GROUND_Y - CUBE_SIZE;
      cube.vy            = 0;
      cube.onGround      = true;
      cube.canDoubleJump = true;
    } else {
      cube.onGround = false;
    }
    cube.rotation += speed * 0.04;
  }

  // ── Spawn obstacles ──
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnObstacle();
    spawnTimer = 0;
  }

  // ── Spawn portals (alle ~10 Sek.) ──
  portalTimer++;
  if (portalTimer >= 600) {
    const nextIdx    = (MODE_CYCLE.indexOf(gameMode) + 1) % MODE_CYCLE.length;
    const targetMode = MODE_CYCLE[nextIdx];
    obstacles.push({ type:'portal', x:W+60, w:24, targetMode, triggered:false });
    portalTimer = 0;
  }

  // ── Move + cull obstacles ──
  for (let i = obstacles.length-1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + (obstacles[i].w ?? 0) < -20) obstacles.splice(i, 1);
  }

  // ── Spawn coins (alle ~150 Frames) ──
  coinSpawnTimer++;
  if (coinSpawnTimer >= 150) {
    const y = Math.random() * (GROUND_Y - CEILING_Y - 100) + CEILING_Y + 50;
    coins.push({ x: W + 60, y, phase: Math.random() * Math.PI * 2 });
    coinSpawnTimer = Math.floor(Math.random() * 40); // leicht variabel
  }

  // ── Coins bewegen + einsammeln ──
  const ccx = cube.x + CUBE_SIZE / 2;
  const ccy = cube.y + CUBE_SIZE / 2;
  for (let i = coins.length - 1; i >= 0; i--) {
    coins[i].x -= speed;
    if (coins[i].x < -30) { coins.splice(i, 1); continue; }
    const dx = ccx - coins[i].x, dy = ccy - coins[i].y;
    if (Math.sqrt(dx*dx + dy*dy) < COIN_R + 14) {
      spawnCoinParticles(coins[i].x, coins[i].y);
      coins.splice(i, 1);
      coinsCollected++;
      score += COIN_VALUE;
      playCoinSound();
    }
  }

  // ── Collision check ──
  checkCollisions();
}

function updateTrail() {
  if (gameState === 'playing') {
    trail.push({ x: cube.x, y: cube.y, rotation: cube.rotation, life: 1.0, mode: gameMode });
    if (trail.length > 14) trail.shift();
  }
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].life -= 0.09;
    if (trail[i].life <= 0) trail.splice(i, 1);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.25; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
function glowText(text, x, y, size, color, glow, blur) {
  ctx.save();
  ctx.font = `bold ${size}px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=glow; ctx.shadowBlur=blur;
  ctx.fillStyle=glow.replace(/[\d.]+\)$/, '0.25)'); ctx.fillText(text,x,y);
  ctx.shadowBlur=blur*0.5; ctx.fillStyle=color; ctx.fillText(text,x,y);
  ctx.restore();
}

// ── Background ──
function drawBackground() {
  const h = displayHue;

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,   `hsl(${h},90%,4%)`);
  sky.addColorStop(0.5, `hsl(${h},85%,9%)`);
  sky.addColorStop(1,   `hsl(${h},80%,14%)`);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,GROUND_Y);

  // Stars
  bgStars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle=`hsla(${h+30},80%,85%,${s.a})`; ctx.fill();
  });

  // Scrolling vertical grid lines
  ctx.save();
  ctx.strokeStyle = `hsla(${h},65%,50%,0.18)`; ctx.lineWidth = 1;
  const gridSpacing = 80;
  const offset = worldX % gridSpacing;
  for (let x = -offset; x < W; x += gridSpacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  // Horizontal grid lines
  ctx.strokeStyle = `hsla(${h},65%,50%,0.10)`;
  for (let y = 80; y < GROUND_Y; y += 80) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  ctx.restore();

  // Deckenline im Ship- und Ball-Modus
  if (gameMode === 'ship' || gameMode === 'ball') {
    ctx.save();
    ctx.strokeStyle = gameMode === 'ship' ? 'rgba(0,255,200,0.55)' : `hsla(${h+30},90%,65%,0.55)`;
    ctx.lineWidth = 2;
    ctx.shadowColor = gameMode === 'ship' ? 'rgba(0,255,200,1)' : `hsla(${h+30},90%,70%,1)`;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(0, CEILING_Y); ctx.lineTo(W, CEILING_Y); ctx.stroke();
    ctx.restore();
  }
}

// ── Ground ──
function drawGround() {
  const h = displayHue;

  // Ground fill
  const gGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gGrad.addColorStop(0, `hsl(${h},80%,13%)`);
  gGrad.addColorStop(1, `hsl(${h},90%,5%)`);
  ctx.fillStyle = gGrad; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground top line (glowing)
  ctx.save();
  ctx.strokeStyle = `hsla(${h+20},85%,65%,0.9)`;
  ctx.lineWidth   = 2;
  ctx.shadowColor = `hsla(${h+20},85%,70%,1)`;
  ctx.shadowBlur  = 12;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  ctx.restore();

  // Ground grid tiles (scrolling)
  ctx.save();
  ctx.strokeStyle = `hsla(${h},65%,45%,0.25)`; ctx.lineWidth = 1;
  const tileW = 40;
  const tOff  = worldX % tileW;
  for (let x = -tOff; x < W; x += tileW) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();
}

// ── Cube ──
function drawCube() {
  ctx.save();
  ctx.translate(cube.x + CUBE_SIZE/2, cube.y + CUBE_SIZE/2);
  ctx.rotate(cube.rotation);

  // Outer glow
  ctx.shadowColor = 'rgba(100,200,255,1)';
  ctx.shadowBlur  = 18;
  ctx.strokeStyle = 'rgba(120,220,255,1)';
  ctx.lineWidth   = 2.5;
  ctx.strokeRect(-CUBE_SIZE/2, -CUBE_SIZE/2, CUBE_SIZE, CUBE_SIZE);

  // Fill
  const cubeGrad = ctx.createLinearGradient(-CUBE_SIZE/2,-CUBE_SIZE/2, CUBE_SIZE/2, CUBE_SIZE/2);
  cubeGrad.addColorStop(0, 'rgba(60,160,255,0.85)');
  cubeGrad.addColorStop(1, 'rgba(20,80,200,0.85)');
  ctx.shadowBlur = 0;
  ctx.fillStyle  = cubeGrad;
  ctx.fillRect(-CUBE_SIZE/2, -CUBE_SIZE/2, CUBE_SIZE, CUBE_SIZE);

  // Inner highlight
  ctx.fillStyle = 'rgba(200,240,255,0.2)';
  ctx.fillRect(-CUBE_SIZE/2+3, -CUBE_SIZE/2+3, CUBE_SIZE-6, CUBE_SIZE/3);

  // Inner cross/detail
  ctx.strokeStyle = 'rgba(160,220,255,0.45)'; ctx.lineWidth = 1;
  ctx.shadowBlur  = 0;
  ctx.beginPath();
  ctx.moveTo(-CUBE_SIZE/2+8, 0); ctx.lineTo(CUBE_SIZE/2-8, 0);
  ctx.moveTo(0, -CUBE_SIZE/2+8); ctx.lineTo(0, CUBE_SIZE/2-8);
  ctx.stroke();

  ctx.restore();
}

// ── Moving Block ──
function drawMovingBlock(ob) {
  const topY = GROUND_Y - ob.h - Math.abs(Math.sin(gameTime * ob.oscSpeed + ob.phase)) * ob.amplitude;
  const x = ob.x;
  ctx.save();

  // Range-Spur (zeigt Bewegungsbereich)
  ctx.setLineDash([3, 4]);
  ctx.strokeStyle = 'rgba(255,180,40,0.2)'; ctx.lineWidth = 1;
  ctx.strokeRect(x + ob.w/2 - 1, GROUND_Y - ob.h - ob.amplitude, 2, ob.amplitude);
  ctx.setLineDash([]);

  // Block (gleicher Stil wie regular block)
  const bg = ctx.createLinearGradient(x, topY, x, topY+ob.h);
  bg.addColorStop(0, 'rgba(255,180,40,0.9)'); bg.addColorStop(1, 'rgba(180,100,0,0.9)');
  ctx.fillStyle = bg; ctx.shadowColor = 'rgba(255,160,20,1)'; ctx.shadowBlur = 12;
  ctx.fillRect(x, topY, ob.w, ob.h);
  ctx.fillStyle = 'rgba(255,240,180,0.22)'; ctx.shadowBlur = 0;
  ctx.fillRect(x+3, topY+3, ob.w-6, ob.h/3);
  ctx.strokeStyle = 'rgba(255,220,100,0.75)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(x, topY, ob.w, ob.h);
  ctx.restore();
}

// ── Floating Spike ──
function drawFloatSpike(ob) {
  const fy = ob.baseY + Math.sin(gameTime * ob.oscSpeed + ob.phase) * ob.amplitude;
  const x  = ob.x;
  ctx.save();

  // Orbit-Spur (zeigt Bewegungsbereich)
  ctx.setLineDash([3, 4]);
  ctx.strokeStyle = 'rgba(255,80,80,0.2)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + ob.w/2, ob.baseY - ob.amplitude);
  ctx.lineTo(x + ob.w/2, ob.baseY + ob.amplitude); ctx.stroke();
  ctx.setLineDash([]);

  // Spike (Dreieck nach oben, mittig schwebend)
  ctx.beginPath();
  ctx.moveTo(x,          fy + ob.h/2);   // links unten
  ctx.lineTo(x + ob.w/2, fy - ob.h/2);  // Spitze oben
  ctx.lineTo(x + ob.w,   fy + ob.h/2);  // rechts unten
  ctx.closePath();
  const sg = ctx.createLinearGradient(x, fy-ob.h/2, x, fy+ob.h/2);
  sg.addColorStop(0, 'rgba(255,80,80,1)'); sg.addColorStop(1, 'rgba(180,20,20,0.9)');
  ctx.fillStyle = sg; ctx.shadowColor = 'rgba(255,60,60,1)'; ctx.shadowBlur = 14; ctx.fill();
  ctx.strokeStyle = 'rgba(255,140,140,0.8)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
}

// ── Ship ──
function drawShip() {
  const cx = cube.x + CUBE_SIZE / 2;
  const cy = cube.y + CUBE_SIZE / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cube.rotation);

  // Engine-Glut (hinten)
  ctx.beginPath(); ctx.arc(-18, 0, 6, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,160,30,0.9)'; ctx.shadowColor='rgba(255,120,0,1)'; ctx.shadowBlur=16; ctx.fill();

  // Rumpf
  ctx.beginPath();
  ctx.moveTo( 22,  0);   // Nase
  ctx.lineTo(  4,-10);   // oben-mitte
  ctx.lineTo(-16,-10);   // oben-hinten
  ctx.lineTo(-20,  0);   // Heck
  ctx.lineTo(-16, 10);   // unten-hinten
  ctx.lineTo(  4, 10);   // unten-mitte
  ctx.closePath();
  const sg = ctx.createLinearGradient(-20,-10,22,10);
  sg.addColorStop(0,'rgba(0,200,160,0.9)'); sg.addColorStop(1,'rgba(0,100,80,0.9)');
  ctx.fillStyle=sg; ctx.shadowColor='rgba(0,255,200,1)'; ctx.shadowBlur=20; ctx.fill();
  ctx.strokeStyle='rgba(80,255,210,1)'; ctx.lineWidth=1.5; ctx.shadowBlur=0; ctx.stroke();

  // Flügel oben
  ctx.beginPath(); ctx.moveTo(-2,-10); ctx.lineTo(-10,-22); ctx.lineTo(-16,-10); ctx.closePath();
  ctx.fillStyle='rgba(0,180,140,0.85)'; ctx.shadowColor='rgba(0,255,200,0.7)'; ctx.shadowBlur=8; ctx.fill();
  ctx.strokeStyle='rgba(80,255,210,0.7)'; ctx.lineWidth=1; ctx.stroke();

  // Flügel unten
  ctx.beginPath(); ctx.moveTo(-2,10); ctx.lineTo(-10,22); ctx.lineTo(-16,10); ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

// ── Ball ──
function drawBall() {
  const r  = CUBE_SIZE / 2;
  const cx = cube.x + r;
  const cy = cube.y + r;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cube.rotation);

  // Glow
  ctx.shadowColor = 'rgba(255,160,40,1)';
  ctx.shadowBlur  = 18;

  // Outer ring
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,180,60,1)'; ctx.lineWidth = 2.5; ctx.stroke();

  // Fill
  const bg = ctx.createRadialGradient(-r*0.3,-r*0.3,0, 0,0,r);
  bg.addColorStop(0, 'rgba(255,220,100,0.9)');
  bg.addColorStop(1, 'rgba(200,80,0,0.9)');
  ctx.shadowBlur = 0;
  ctx.fillStyle  = bg;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

  // Middle ring
  ctx.strokeStyle = 'rgba(255,200,80,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0,0,r*0.55,0,Math.PI*2); ctx.stroke();

  // Diagonal band (gibt Balll-Rotation Tiefe)
  ctx.save();
  ctx.clip();
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = 'rgba(255,240,140,0.18)';
  ctx.fillRect(-r, -r*0.3, r*2, r*0.6);
  ctx.restore();

  // Highlight
  ctx.beginPath();
  ctx.ellipse(-r*0.22,-r*0.3, r*0.22,r*0.12, -0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,220,0.4)'; ctx.fill();

  ctx.restore();
}

// ── Portal ──
function drawPortal(ob) {
  const hue = { ship: 160, ball: 30, cube: 270 }[ob.targetMode] ?? 270;
  const cx     = ob.x + ob.w / 2;
  const h      = GROUND_Y - CEILING_Y;
  ctx.save();
  const grad = ctx.createLinearGradient(ob.x, 0, ob.x + ob.w, 0);
  grad.addColorStop(0,   `hsla(${hue},100%,65%,0)`);
  grad.addColorStop(0.5, `hsla(${hue},100%,65%,0.6)`);
  grad.addColorStop(1,   `hsla(${hue},100%,65%,0)`);
  ctx.fillStyle=grad; ctx.shadowColor=`hsla(${hue},100%,65%,1)`; ctx.shadowBlur=28;
  ctx.fillRect(ob.x, CEILING_Y, ob.w, h);
  ctx.font=`bold 9px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=`hsla(${hue},100%,85%,0.9)`; ctx.shadowBlur=8;
  ctx.fillText({ ship:'SHIP', ball:'BALL', cube:'CUBE' }[ob.targetMode] ?? 'CUBE', cx, CEILING_Y + h / 2);
  ctx.restore();
}

// ── Spike ──
function drawSpike(ob) {
  const x = ob.x, y = GROUND_Y;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x,             y);            // bottom-left
  ctx.lineTo(x + ob.w/2,   y - ob.h);     // tip
  ctx.lineTo(x + ob.w,     y);            // bottom-right
  ctx.closePath();

  // Fill
  const sg = ctx.createLinearGradient(x, y-ob.h, x, y);
  sg.addColorStop(0, 'rgba(255,80,80,1)');
  sg.addColorStop(1, 'rgba(180,20,20,0.9)');
  ctx.fillStyle   = sg;
  ctx.shadowColor = 'rgba(255,60,60,1)';
  ctx.shadowBlur  = 14;
  ctx.fill();

  // Outline
  ctx.strokeStyle = 'rgba(255,140,140,0.8)'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

// ── Block ──
function drawBlock(ob) {
  const x = ob.x, y = GROUND_Y - ob.h;
  ctx.save();

  // Fill
  const bg = ctx.createLinearGradient(x, y, x, y+ob.h);
  bg.addColorStop(0, 'rgba(255,180,40,0.9)');
  bg.addColorStop(1, 'rgba(180,100,0,0.9)');
  ctx.fillStyle   = bg;
  ctx.shadowColor = 'rgba(255,160,20,1)';
  ctx.shadowBlur  = 12;
  ctx.fillRect(x, y, ob.w, ob.h);

  // Highlight
  ctx.fillStyle = 'rgba(255,240,180,0.22)';
  ctx.fillRect(x+3, y+3, ob.w-6, ob.h/3);

  // Border
  ctx.strokeStyle = 'rgba(255,220,100,0.75)'; ctx.lineWidth = 1.5; ctx.shadowBlur=0;
  ctx.strokeRect(x, y, ob.w, ob.h);
  ctx.restore();
}

// ── HUD ──
function drawHUD() {
  ctx.save();
  ctx.font=`bold 18px ${FONT}`; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.shadowColor='rgba(180,100,255,1)'; ctx.shadowBlur=10; ctx.fillStyle='rgba(220,190,255,0.9)';
  ctx.fillText(score.toString().padStart(5,'0'), W-24, 20);

  ctx.font=`9px ${FONT}`; ctx.fillStyle='rgba(160,140,210,0.4)'; ctx.shadowBlur=0;
  ctx.fillText(`BEST ${bestScore.toString().padStart(5,'0')}`, W-24, 46);
  ctx.restore();

  // Attempt counter
  ctx.save();
  ctx.font=`bold 11px ${FONT}`; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.shadowColor='rgba(140,80,255,0.8)'; ctx.shadowBlur=8;
  ctx.fillStyle='rgba(180,150,255,0.65)';
  ctx.fillText(`ATTEMPT  ${attempts}`, 20, 20);
  ctx.restore();

  // Coin counter
  ctx.save();
  ctx.textAlign='left'; ctx.textBaseline='top';
  // Coin icon
  ctx.shadowColor='rgba(255,210,0,1)'; ctx.shadowBlur=8;
  ctx.fillStyle='rgba(255,220,60,0.95)';
  ctx.beginPath(); ctx.arc(26, 48, 7, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,180,0.5)'; ctx.lineWidth=1; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(26, 48, 4, 0, Math.PI*2); ctx.stroke();
  // Count
  ctx.font=`bold 11px ${FONT}`;
  ctx.shadowColor='rgba(255,200,0,0.8)'; ctx.shadowBlur=6;
  ctx.fillStyle='rgba(255,230,100,0.8)';
  ctx.fillText(`× ${coinsCollected}`, 40, 42);
  ctx.restore();
}

// ── Start Screen ──
function drawStartScreen(t) {
  glowText('GEOMETRY DASH', W/2, H/2-100, 52, 'rgba(200,180,255,1)', 'rgba(140,80,255,1)', 36);
  ctx.save();
  ctx.font=`bold 13px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,180,80,0.8)'; ctx.shadowBlur=12; ctx.fillStyle='rgba(255,200,100,0.75)';
  ctx.fillText('NEON  EDITION', W/2, H/2-48); ctx.restore();

  const pulse = 0.5+0.5*Math.sin(t*3.5);
  ctx.save(); ctx.globalAlpha=0.5+0.5*pulse;
  ctx.font=`bold 13px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(140,80,255,1)'; ctx.shadowBlur=14; ctx.fillStyle='rgba(220,190,255,1)';
  ctx.fillText(isTouchDevice?'TAP  TO  START':'SPACE / CLICK  TO  START', W/2, H/2+10);
  ctx.restore();

  ctx.save();
  ctx.font=`10px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(160,140,200,0.5)';
  ctx.fillText(isTouchDevice?'TAP  TO  JUMP':'SPACE / CLICK  =  JUMP', W/2, H/2+46);
  ctx.restore();
}

// ── Dead Screen ──
function drawDeadScreen(t) {
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(W/2-200, H/2-100, 400, 200); ctx.restore();

  glowText('YOU DIED', W/2, H/2-42, 40, 'rgba(255,100,100,1)', 'rgba(255,40,40,1)', 28);

  ctx.save();
  ctx.font=`bold 12px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(200,180,255,0.8)';
  ctx.shadowColor='rgba(140,80,255,1)'; ctx.shadowBlur=6;
  ctx.fillText(`SCORE  ${score}    BEST  ${bestScore}`, W/2, H/2+8); ctx.restore();

  const pulse=0.5+0.5*Math.sin(t*3.5);
  ctx.save(); ctx.globalAlpha=0.5+0.5*pulse;
  ctx.font=`bold 11px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(140,80,255,1)'; ctx.shadowBlur=10; ctx.fillStyle='rgba(220,190,255,1)';
  ctx.fillText(isTouchDevice?'TAP  TO  RETRY':'SPACE / CLICK  TO  RETRY', W/2, H/2+48);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render(t) {
  ctx.save();
  if (shakeFrames > 0) {
    const mag = (shakeFrames / SHAKE_DURATION) * SHAKE_MAGNITUDE;
    ctx.translate((Math.random() - 0.5) * mag * 2, (Math.random() - 0.5) * mag * 2);
    shakeFrames--;
  }

  drawBackground();

  // Obstacles + Portale
  obstacles.forEach(ob => {
    if      (ob.type==='spike')       drawSpike(ob);
    else if (ob.type==='block')       drawBlock(ob);
    else if (ob.type==='movingBlock') drawMovingBlock(ob);
    else if (ob.type==='floatSpike')  drawFloatSpike(ob);
    else if (ob.type==='portal')      drawPortal(ob);
  });

  drawCoins(t);
  drawTrail();

  // Spieler
  if      (gameMode === 'ship') drawShip();
  else if (gameMode === 'ball') drawBall();
  else                          drawCube();

  drawGround();
  drawParticles();
  ctx.restore(); // Shake endet hier – HUD bleibt stabil

  drawHUD();
  if (gameState==='start') drawStartScreen(t);
  if (gameState==='dead')  drawDeadScreen(t);
}

// ── Coins ──
function spawnCoinParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const spd   = Math.random() * 3 + 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
      life: 1.0, decay: 0.06, size: Math.random() * 4 + 2, hue: 45,
    });
  }
}

function coinStar(outerR, innerR, spikes = 5) {
  let rot = -Math.PI / 2;
  const step = Math.PI / spikes;
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    ctx.lineTo(Math.cos(rot) * r, Math.sin(rot) * r);
    rot += step;
  }
  ctx.closePath();
}

function drawCoins(t) {
  coins.forEach(c => {
    // 3-D Dreh-Effekt: X-Achse zusammenquetschen
    const spinX = Math.abs(Math.cos(t * 2.5 + c.phase));
    const bob   = Math.sin(t * 3 + c.phase) * 3; // leichtes Schweben
    const r     = COIN_R;

    ctx.save();
    ctx.translate(c.x, c.y + bob);
    ctx.scale(Math.max(spinX, 0.06), 1);

    // Glow
    ctx.shadowColor = 'rgba(255,195,0,1)';
    ctx.shadowBlur  = 18;

    // Äußerer Rand (dunkelgold)
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#b8860b'; ctx.fill();

    // Hauptfläche – Radial-Gradient off-center für Tiefenwirkung
    const fg = ctx.createRadialGradient(-r * 0.28, -r * 0.32, r * 0.04, 0, 0, r * 0.92);
    fg.addColorStop(0,    '#fffaaa');
    fg.addColorStop(0.3,  '#ffd700');
    fg.addColorStop(0.75, '#daa520');
    fg.addColorStop(1,    '#b8860b');
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, 0, r * 0.86, 0, Math.PI * 2);
    ctx.fillStyle = fg; ctx.fill();

    // Geränderte Kante (gestrichelt)
    ctx.setLineDash([2, 2.5]);
    ctx.strokeStyle = 'rgba(160,110,0,0.55)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0, 0, r * 0.93, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);

    // Stern-Symbol
    coinStar(r * 0.48, r * 0.21);
    ctx.fillStyle = 'rgba(155,105,0,0.6)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,225,80,0.35)'; ctx.lineWidth = 0.5; ctx.stroke();

    // Glanzfleck oben-links
    ctx.beginPath();
    ctx.ellipse(-r * 0.24, -r * 0.3, r * 0.27, r * 0.14, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,230,0.38)'; ctx.fill();

    ctx.restore();
  });
}

// ── Trail ──
function drawTrail() {
  trail.forEach(t => {
    const alpha = t.life * 0.45;
    const trailColor = t.mode === 'ship' ? '0,220,170' : t.mode === 'ball' ? '255,160,30' : '80,180,255';
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(t.x + CUBE_SIZE / 2, t.y + CUBE_SIZE / 2);
    ctx.rotate(t.rotation);
    ctx.shadowColor = `rgba(${trailColor},0.9)`;
    ctx.shadowBlur  = 12;
    ctx.strokeStyle = `rgba(${trailColor},1)`;
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(-CUBE_SIZE / 2, -CUBE_SIZE / 2, CUBE_SIZE, CUBE_SIZE);
    ctx.restore();
  });
}

// ── Particles ──
function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = `hsl(${p.hue}, 100%, 70%)`;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
    ctx.shadowBlur  = 10;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.restore();
  });
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function loop(ts) { update(); updateParticles(); updateTrail(); render(ts * 0.001); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

</script>
